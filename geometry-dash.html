<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUBEDASH — Endless Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --neon-cyan: #00f5ff;
    --neon-magenta: #ff00cc;
    --neon-yellow: #ffe600;
    --dark-bg: #050510;
  }
  html, body { width:100%; height:100%; background:var(--dark-bg); overflow:hidden; font-family:'Orbitron',monospace; }
  #gameWrapper { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; max-width:100%; max-height:100%; image-rendering:pixelated; }
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; pointer-events:none; opacity:0; transition:opacity .4s ease; }
  .screen.visible { opacity:1; pointer-events:all; }
  .logo { font-size:clamp(2.4rem,7vw,5rem); font-weight:900; letter-spacing:.12em; color:#fff; text-shadow:0 0 10px var(--neon-cyan),0 0 30px var(--neon-cyan),0 0 60px var(--neon-cyan); animation:logoFlicker 3s infinite alternate; }
  .tagline { font-family:'Share Tech Mono',monospace; font-size:clamp(.75rem,2vw,1rem); color:var(--neon-magenta); letter-spacing:.22em; text-transform:uppercase; opacity:.85; }
  .btn { font-family:'Orbitron',monospace; font-weight:700; font-size:clamp(.9rem,2.5vw,1.1rem); letter-spacing:.18em; text-transform:uppercase; padding:14px 44px; border:2px solid var(--neon-cyan); background:transparent; color:var(--neon-cyan); cursor:pointer; position:relative; overflow:hidden; transition:color .25s,background .25s,box-shadow .25s; clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%); }
  .btn::before { content:''; position:absolute; inset:0; background:var(--neon-cyan); transform:scaleX(0); transform-origin:left; transition:transform .25s ease; z-index:-1; }
  .btn:hover::before { transform:scaleX(1); }
  .btn:hover { color:var(--dark-bg); box-shadow:0 0 24px var(--neon-cyan); }
  .score-display { font-size:clamp(1.1rem,3.5vw,1.8rem); color:var(--neon-yellow); text-shadow:0 0 12px var(--neon-yellow); letter-spacing:.1em; }
  .best-display { font-family:'Share Tech Mono',monospace; font-size:clamp(.8rem,2vw,1rem); color:#aaa; letter-spacing:.15em; }
  .hint { font-family:'Share Tech Mono',monospace; font-size:clamp(.65rem,1.8vw,.85rem); color:rgba(255,255,255,.4); letter-spacing:.15em; margin-top:8px; }
  #hud { position:absolute; top:22px; left:0; right:0; display:flex; justify-content:space-between; padding:0 30px; pointer-events:none; opacity:0; transition:opacity .4s; }
  #hud.visible { opacity:1; }
  .hud-item { font-family:'Share Tech Mono',monospace; font-size:clamp(.75rem,2vw,.95rem); color:rgba(255,255,255,.7); letter-spacing:.12em; }
  #hudScore { color:var(--neon-yellow); text-shadow:0 0 8px var(--neon-yellow); }
  @keyframes logoFlicker { 0%,90%,100%{opacity:1} 92%{opacity:.6} 95%{opacity:1} 97%{opacity:.4} }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>
  <div id="hud">
    <span class="hud-item" id="hudScore">0</span>
    <span class="hud-item" id="hudSpeed">SPEED ×1.0</span>
  </div>
  <div class="screen visible" id="startScreen">
    <div class="logo">CUBEDASH</div>
    <div class="tagline">Dodge · Jump · Survive</div>
    <button class="btn" id="startBtn">START GAME</button>
    <div class="hint">SPACE / TAP to jump &nbsp;·&nbsp; Double jump available</div>
  </div>
  <div class="screen" id="overScreen">
    <div class="logo" style="font-size:clamp(1.8rem,5vw,3.5rem);color:var(--neon-magenta);text-shadow:0 0 20px var(--neon-magenta)">GAME OVER</div>
    <div class="score-display" id="finalScore">SCORE: 0</div>
    <div class="best-display" id="bestScore">BEST: 0</div>
    <button class="btn" id="restartBtn">PLAY AGAIN</button>
  </div>
</div>

function playTone(freq,type,duration,vol=0.3,startTime=AC.currentTime) {
  const osc=AC.createOscillator(), gain=AC.createGain();
  osc.connect(gain); gain.connect(AC.destination);

    {f:523,d:.15},{f:659,d:.15},{f:784,d:.15},{f:659,d:.15},{f:523,d:.15},{f:440,d:.15},{f:523,d:.3},
    {f:587,d:.15},{f:698,d:.15},{f:880,d:.15},{f:698,d:.15},{f:587,d:.15},{f:523,d:.15},{f:587,d:.3},
    {f:659,d:.15},{f:784,d:.15},{f:988,d:.15},{f:784,d:.15},{f:659,d:.15},{f:587,d:.15},{f:659,d:.3},
    {f:523,d:.15},{f:440,d:.15},{f:392,d:.15},{f:440,d:.15},{f:523,d:.15},{f:587,d:.15},{f:523,d:.3},
  ];
  const totalDur=melody.reduce((s,n)=>s+n.d,0);
  function scheduleMelody(startT) {
    let t=startT;
    melody.forEach(n=>{ playTone(n.f,'square',n.d*0.8,0.07,t); t+=n.d; });
  }
  let loopStart=AC.currentTime+0.1;
  scheduleMelody(loopStart);
  const li=setInterval(()=>{ loopStart+=totalDur; scheduleMelody(loopStart); },totalDur*1000);
  musicNodes.push(li);
}
function stopMusic() { musicNodes.forEach(n=>clearInterval(n)); musicNodes=[]; }

/* ── CANVAS ── */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const LOGICAL_W=900, LOGICAL_H=480;
function resize() {
  const ratio=Math.min(window.innerWidth/LOGICAL_W, window.innerHeight/LOGICAL_H);
  canvas.style.width=(LOGICAL_W*ratio)+'px'; canvas.style.height=(LOGICAL_H*ratio)+'px';
  canvas.width=LOGICAL_W; canvas.height=LOGICAL_H;
}
window.addEventListener('resize',resize); resize();

/* ── CONSTANTS ── */
const GROUND_Y=LOGICAL_H-90, PLAYER_SIZE=38, PLAYER_X=130;

/* ── STATE ── */
let state='start', score=0, best=0, gameSpeed=5, frame=0;
let playerY,playerVY,jumpsLeft,playerAngle,isOnGround;
let obstacles=[],particles=[],bgStars=[];
let shakeFrames=0;

/* ── STARS ── */
function initBg() {
  bgStars=Array.from({length:90},()=>({
    x:Math.random()*LOGICAL_W, y:Math.random()*LOGICAL_H*0.6,
    r:Math.random()*1.8+0.3, speed:Math.random()*0.5+0.1, alpha:Math.random()*0.7+0.3,
  }));
}

/* ── PLAYER ── */
function resetPlayer() { playerY=GROUND_Y; playerVY=0; jumpsLeft=2; isOnGround=true; playerAngle=0; }

function jump() {
  if(jumpsLeft<=0) return;
  resumeAC();
  const isDouble=!isOnGround;
  playerVY=isDouble?-13.5:-16;
  jumpsLeft--; isOnGround=false;
  playJump(); spawnJumpParticles();
}

/* ── OBSTACLES ── */
const OBS_TYPES=['spike','block','doubleSpike','tallBlock'];
function spawnObstacle() {
  const type=OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
  let w,h;
  switch(type){ case'spike':w=30;h=46;break; case'block':w=42;h=42;break; case'doubleSpike':w=60;h=46;break; case'tallBlock':w=36;h=72;break; }
  // Obstacle hue tracks current theme: red phase => red/orange, blue phase => cyan/purple
  const hue = bgPhase > 0.5
    ? 0 + Math.random()*40          // reds
    : 200 + Math.random()*60;       // blues/purples
  obstacles.push({x:LOGICAL_W+20,y:GROUND_Y+PLAYER_SIZE-h,w,h,type,hue});
}

/* ── PARTICLES ── */
function spawnJumpParticles() {
  const hue = bgPhase>0.5 ? 0+Math.random()*50 : 200+Math.random()*80;
  for(let i=0;i<12;i++){
    const angle=Math.PI+(Math.random()-.5)*1.4, spd=Math.random()*4+2;
    particles.push({x:PLAYER_X+PLAYER_SIZE/2,y:playerY+PLAYER_SIZE,
      vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-1,life:1,maxLife:1,
      r:Math.random()*5+2, color:`hsl(${hue+Math.random()*40},100%,70%)`});
  }
}
function spawnCrashParticles() {
  for(let i=0;i<40;i++){
    const angle=Math.random()*Math.PI*2, spd=Math.random()*8+2;
    particles.push({x:PLAYER_X+PLAYER_SIZE/2,y:playerY+PLAYER_SIZE/2,
      vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:1,maxLife:1,
      r:Math.random()*7+2, color:`hsl(${Math.random()*40+10},100%,60%)`});
  }
}

/* ── DRAW BACKGROUND WITH IMAGE BLEND ── */
function drawBackground() {
  // Advance phase (oscillate 0..1)
  bgPhase += bgPhaseDir;
  if (bgPhase >= 1) { bgPhase = 1; bgPhaseDir = -bgPhaseDir; }
  if (bgPhase <= 0) { bgPhase = 0; bgPhaseDir = -bgPhaseDir; }

  // Draw blue/purple image first (always)
  if (BG_BLUE.complete && BG_BLUE.naturalWidth) {
    ctx.globalAlpha = 1;
    ctx.drawImage(BG_BLUE, 0, 0, LOGICAL_W, LOGICAL_H);
  }
  // Blend red image on top based on bgPhase
  if (BG_RED.complete && BG_RED.naturalWidth) {
    ctx.globalAlpha = bgPhase;
    ctx.drawImage(BG_RED, 0, 0, LOGICAL_W, LOGICAL_H);
    ctx.globalAlpha = 1;
  }

  // Overlay a subtle dark vignette to keep UI readable
  const vig = ctx.createRadialGradient(LOGICAL_W/2,LOGICAL_H/2,LOGICAL_H*0.2,LOGICAL_W/2,LOGICAL_H/2,LOGICAL_H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=vig;
  ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);
}

function drawStars() {
  bgStars.forEach(s=>{
    if(state==='playing') { s.x-=s.speed*(gameSpeed/5); if(s.x<0){s.x=LOGICAL_W;s.y=Math.random()*LOGICAL_H*0.55;} }
    // Star color tints with theme
    const starHue = bgPhase>0.5 ? `rgba(255,${Math.floor(180*(1-bgPhase))},${Math.floor(180*(1-bgPhase))},${s.alpha})`
                                 : `rgba(${Math.floor(180*bgPhase)},${Math.floor(220*(1-bgPhase)+100)},255,${s.alpha})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=starHue; ctx.fill();
  });
}

/* Ground color follows theme */
function getThemeColor(blueH, blueS, blueL, redH, redS, redL) {
  const h = blueH + (redH - blueH) * bgPhase;
  const s = blueS + (redS - blueS) * bgPhase;
  const l = blueL + (redL - blueL) * bgPhase;
  return `hsl(${h},${s}%,${l}%)`;
}

function drawGround() {
  const gc = getThemeColor(200,100,60, 0,100,55);
  const grdG=ctx.createLinearGradient(0,GROUND_Y+PLAYER_SIZE,0,LOGICAL_H);
  grdG.addColorStop(0,`hsla(${bgPhase>0.5?0:200},80%,40%,0.4)`);
  grdG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grdG;
  ctx.fillRect(0,GROUND_Y+PLAYER_SIZE,LOGICAL_W,LOGICAL_H-(GROUND_Y+PLAYER_SIZE));
  ctx.strokeStyle=gc; ctx.lineWidth=2;
  ctx.shadowColor=gc; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.moveTo(0,GROUND_Y+PLAYER_SIZE); ctx.lineTo(LOGICAL_W,GROUND_Y+PLAYER_SIZE); ctx.stroke();
  ctx.shadowBlur=0;
}

function drawGrid() {
  const gridOffset=(frame*gameSpeed*0.5)%60;
  const gc=getThemeColor(200,100,60, 0,100,55);
  ctx.strokeStyle=`hsla(${bgPhase>0.5?0:200},100%,70%,0.10)`;
  ctx.lineWidth=1;
  for(let x=-gridOffset;x<LOGICAL_W;x+=60){ ctx.beginPath();ctx.moveTo(x,GROUND_Y+PLAYER_SIZE);ctx.lineTo(x,LOGICAL_H);ctx.stroke(); }
  for(let y=GROUND_Y+PLAYER_SIZE;y<LOGICAL_H;y+=30){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(LOGICAL_W,y);ctx.stroke(); }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(PLAYER_X+PLAYER_SIZE/2,playerY+PLAYER_SIZE/2);
  ctx.rotate(playerAngle);
  const ph=getThemeColor(180,100,70, 40,100,65);
  const ph2=getThemeColor(260,100,45, 10,100,45);
  ctx.shadowColor=ph; ctx.shadowBlur=18;
  const pg=ctx.createLinearGradient(-PLAYER_SIZE/2,-PLAYER_SIZE/2,PLAYER_SIZE/2,PLAYER_SIZE/2);
  pg.addColorStop(0,ph); pg.addColorStop(1,ph2);
  ctx.fillStyle=pg;
  roundRect(ctx,-PLAYER_SIZE/2,-PLAYER_SIZE/2,PLAYER_SIZE,PLAYER_SIZE,5);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5;
  roundRect(ctx,-PLAYER_SIZE/2+5,-PLAYER_SIZE/2+5,PLAYER_SIZE-10,PLAYER_SIZE-10,3); ctx.stroke();
  const eyeX=8,eyeY=-6;
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(eyeX,eyeY,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(eyeX+1,eyeY,2.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawObstacle(o) {
  ctx.save();
  ctx.shadowColor=`hsl(${o.hue},100%,65%)`; ctx.shadowBlur=12;
  const og=ctx.createLinearGradient(o.x,o.y,o.x+o.w,o.y+o.h);
  og.addColorStop(0,`hsl(${o.hue},100%,65%)`);
  og.addColorStop(1,`hsl(${(o.hue+40)%360},100%,45%)`);
  ctx.fillStyle=og;
  if(o.type==='spike'||o.type==='doubleSpike'){
    const count=o.type==='doubleSpike'?2:1, sw=o.w/count;
    for(let i=0;i<count;i++){
      ctx.beginPath(); ctx.moveTo(o.x+i*sw,o.y+o.h); ctx.lineTo(o.x+i*sw+sw/2,o.y); ctx.lineTo(o.x+i*sw+sw,o.y+o.h); ctx.closePath(); ctx.fill();
    }
  } else {
    roundRect(ctx,o.x,o.y,o.w,o.h,4); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;
}

function drawHUDBar() {
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(0,0,LOGICAL_W,46);
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,46); ctx.lineTo(LOGICAL_W,46); ctx.stroke();
}

/* ── COLLISION ── */
function checkCollision(o) {
  const px=PLAYER_X+4, py=playerY+4, pw=PLAYER_SIZE-8, ph=PLAYER_SIZE-4;
  if(o.type==='spike'||o.type==='doubleSpike'){
    const count=o.type==='doubleSpike'?2:1, sw=o.w/count;
    for(let i=0;i<count;i++){
      const tx=o.x+i*sw,tw=sw,ty=o.y,th=o.h;
      if(px+pw>tx+tw*0.25&&px<tx+tw*0.75&&py+ph>ty+th*0.4&&py<ty+th) return true;
    }
    return false;
  }
  return px+pw>o.x&&px<o.x+o.w&&py+ph>o.y&&py<o.y+o.h;
}

/* ── GAME LOOP ── */
function gameLoop() {
  frame++;
  requestAnimationFrame(gameLoop);
  let sx=0,sy=0;
  if(shakeFrames>0){ sx=(Math.random()-.5)*12; sy=(Math.random()-.5)*12; shakeFrames--; }
  ctx.save(); ctx.translate(sx,sy);

  drawBackground();
  drawStars();
  drawGrid();
  drawGround();

  if(state==='playing'){
    playerVY+=0.75; playerY+=playerVY;
    if(playerY>=GROUND_Y){ playerY=GROUND_Y; playerVY=0; isOnGround=true; jumpsLeft=2; playerAngle=Math.round(playerAngle/(Math.PI/2))*(Math.PI/2); }
    else { isOnGround=false; playerAngle+=0.08*(gameSpeed/5); }
    gameSpeed=5+frame*0.002; if(gameSpeed>14)gameSpeed=14;
    score=Math.floor(frame/6);
    document.getElementById('hudScore').textContent=score;
    document.getElementById('hudSpeed').textContent=`SPEED ×${gameSpeed.toFixed(1)}`;
    const gap=Math.max(60,140-frame*0.04);
    if(frame%Math.floor(gap)===0) spawnObstacle();
    obstacles.forEach(o=>o.x-=gameSpeed);
    obstacles=obstacles.filter(o=>o.x>-100);
    for(const o of obstacles){ if(checkCollision(o)){triggerGameOver();break;} }
    particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=0.04; });
    particles=particles.filter(p=>p.life>0);
    drawParticles(); obstacles.forEach(drawObstacle); drawPlayer(); drawHUDBar();
  } else {
    drawParticles(); obstacles.forEach(drawObstacle);
    if(state==='over') drawPlayer();
    drawHUDBar();
  }
  ctx.restore();
}

function triggerGameOver() {
  state='over'; playCrash(); stopMusic(); shakeFrames=18; spawnCrashParticles();
  if(score>best) best=score;
  document.getElementById('finalScore').textContent=`SCORE: ${score}`;
  document.getElementById('bestScore').textContent=`BEST:  ${best}`;
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('overScreen').classList.add('visible');
}

function startGame() {
  resumeAC();
  document.getElementById('startScreen').classList.remove('visible');
  document.getElementById('overScreen').classList.remove('visible');
  document.getElementById('hud').classList.add('visible');
  obstacles=[]; particles=[]; frame=0; gameSpeed=5; score=0;
  resetPlayer(); state='playing'; startMusic();
}

document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();if(state==='playing')jump();} });
canvas.addEventListener('pointerdown',e=>{ e.preventDefault(); if(state==='playing')jump(); });
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);

initBg(); resetPlayer(); gameLoop();
})();
</script>
</body>
</html>
